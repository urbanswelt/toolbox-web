name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      # uv reads .python-version / requires-python and fetches Python 3.14 itself.
      - name: Sync dependencies (incl. dev group)
        run: uv sync --group dev

      # requirements.txt is a generated pip fallback — it must stay a faithful
      # export of uv.lock. Re-export and fail if it drifts (e.g. a lock bump that
      # forgot to regenerate it, or a hand-edit of the derived file).
      - name: requirements.txt in sync with uv.lock
        run: |
          uv export --no-hashes --no-emit-project -o requirements.txt
          git diff --exit-code requirements.txt \
            || { echo "::error::requirements.txt is out of sync with uv.lock. Run: uv export --no-hashes --no-emit-project -o requirements.txt"; exit 1; }

      - name: Lint
        run: uv run ruff check .

      # Smoke test: boots the Flask app and hits its core routes. This is the
      # gate for Dependabot PRs — a breaking dependency bump fails here.
      - name: Test
        run: uv run pytest -q
